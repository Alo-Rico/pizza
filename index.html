<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Menú Alo Rico - Pizzas</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #fefaf0; text-align: center; margin: 0; padding: 0; }
    header { margin-top: 20px; }
    header img.logo { width: 120px; height: auto; }
    header h1 { font-size: 28px; color: #c24a00; margin: 10px 0 5px; }
    header img.icono { width: 60px; height: auto; margin-bottom: 10px; }
    .menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; padding-bottom: 180px; }
    .product { width: 180px; background: white; margin: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
    .product:hover { transform: scale(1.03); }
    .product img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px 10px 0 0; }
    .product h3 { margin: 10px 0 5px; font-size: 16px; }
    .product p { margin: 0 0 10px; color: #444; font-weight: bold; }
    .btn-grid { position: fixed; right: 15px; bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 9998; }
    .btn-flotante { color: #fff; border: none; padding: 12px 18px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 140px; }
    #btnBebidas { background-color: #007bff; }
    #btnHamburguesas { background-color: #28a745; }
    #btnLomitos { background-color: #ffc107; color: #000; }
    #btnCarrito { background-color: #ff5722; }
    #mensaje-total { display:none;background:#28a745;color:#fff;padding:8px;border-radius:10px;grid-column:span 2;font-weight:bold; }
    #pedido-flotante { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;padding:15px;border-radius:10px; }
    #pedido-flotante.activo { transform:translate(-50%,-50%) scale(1); }
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<div class="btn-grid">
<div id="mensaje-total">💰 Total: Gs. 0</div>
<button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
<button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
<button id="btnLomitos" class="btn-flotante">LOMITOS</button>
<button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar">Borrar todo</button>
</div>

<!-- 🔥 FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754",
  storageBucket: "alorico-59754.firebasestorage.app",
  messagingSenderId: "120993494626",
  appId: "1:120993494626:web:9f9cb0ad6fbfbd1abd033b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

// 🔁 REEMPLAZA lectura
function obtenerPedido(callback){
  onValue(pedidoRef,(snap)=>{
    const data = snap.val();
    callback(data ? Object.values(data) : []);
  },{onlyOnce:true});
}

// 🔁 REEMPLAZA guardado
function guardarPedido(pedido){
  remove(pedidoRef);
  pedido.forEach(p=>push(pedidoRef,p));
}

// 🔁 RENDER
function render(){
  obtenerPedido(pedido=>{
    let total=0;
    const lista=document.getElementById("lista-pedido");
    lista.innerHTML="";
    pedido.forEach(p=>{
      total+=p.precio;
      const li=document.createElement("li");
      li.textContent=p.nombre+" - Gs. "+p.precio;
      lista.appendChild(li);
    });

    document.getElementById("mensaje-total").style.display=pedido.length?"block":"none";
    document.getElementById("mensaje-total").innerText="💰 Total: Gs. "+total.toLocaleString();
    document.getElementById("total-pedido").innerText="Total: Gs. "+total;
  });
}

// BORRAR
document.getElementById("btn-borrar").onclick=()=>remove(pedidoRef);

// BOTÓN
btnCarrito.onclick=()=>document.getElementById("pedido-flotante").classList.toggle("activo");

// MENU
const res = await fetch("precios.json");
const data = await res.json();

const menu=document.getElementById("menu");

Object.entries(data).forEach(([n,i])=>{
  const card=document.createElement("div");
  card.className="product";
  card.innerHTML=`<img src="${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;
  card.onclick=()=>{
    obtenerPedido(p=>{
      p.push({nombre:n,precio:i.precio});
      guardarPedido(p);
      render();
    });
  };
  menu.appendChild(card);
});

render();
</script>

</body>
</html>
