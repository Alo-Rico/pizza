<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico</title>

<style>
body { font-family: Arial; background:#fefaf0; margin:0; text-align:center; }
header img.logo { width:120px; }
header h1 { color:#c24a00; }

.menu-container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; }
.product { width:180px; background:white; margin:15px; border-radius:10px; cursor:pointer; }
.product img { width:100%; height:140px; object-fit:cover; }

.modal { display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; }
.modal-content { background:white; padding:20px; border-radius:10px; }

#pedido-flotante {
 position:fixed;
 bottom:0;
 width:100%;
 background:white;
 padding:10px;
 text-align:left;
}
.borrar { background:red; color:white; }
.whatsapp { background:green; color:white; }
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png">
</header>

<div id="menu" class="menu-container"></div>

<div id="modal" class="modal">
<div class="modal-content">
<h2 id="modal-titulo"></h2>
<button id="btn-entera">Entera</button>
<button id="btn-mitad">Mitad</button>
<button id="btn-cancelar">Cancelar</button>
</div>
</div>

<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar" class="borrar">Borrar</button>
<button id="btn-whatsapp" class="whatsapp">Enviar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

let productosGlobal = {};
let mitadPendiente = null;

const modal = document.getElementById("modal");
const titulo = document.getElementById("modal-titulo");

// 🔥 ESCUCHAR PEDIDO
onValue(pedidoRef, snap=>{
 const data = snap.val();
 const lista = document.getElementById("lista-pedido");
 const totalTxt = document.getElementById("total-pedido");

 lista.innerHTML="";
 let total=0;

 if(data){
  Object.values(data).forEach(p=>{
   const li=document.createElement("li");
   li.innerText=p.nombre;
   lista.appendChild(li);
   total+=p.precio;
  });
 }

 totalTxt.innerText="Total: Gs. "+total.toLocaleString();
});

// MODAL
document.getElementById("btn-cancelar").onclick=()=>{
 modal.style.display="none";
 mitadPendiente=null;
};

document.getElementById("btn-entera").onclick=()=>{
 const nombre=titulo.textContent;
 const precio=productosGlobal[nombre].precio;

 push(pedidoRef,{nombre,precio});
 modal.style.display="none";
};

document.getElementById("btn-mitad").onclick=()=>{
 const nombre=titulo.textContent;
 const precio=productosGlobal[nombre].precio;

 if(!mitadPendiente){
  mitadPendiente={nombre,precio};
  modal.style.display="none";
  alert("Elegí la segunda mitad");
 } else {
  const precioFinal=Math.max(mitadPendiente.precio,precio);

  push(pedidoRef,{
   nombre:`Mitad ${mitadPendiente.nombre} + ${nombre}`,
   precio:precioFinal
  });

  mitadPendiente=null;
  modal.style.display="none";
 }
};

// BORRAR
document.getElementById("btn-borrar").onclick=()=>remove(pedidoRef);

// WHATSAPP
document.getElementById("btn-whatsapp").onclick=()=>{
 onValue(pedidoRef,snap=>{
  const data=snap.val();
  if(!data) return alert("Vacío");

  let msg="Pedido:\n";
  let total=0;

  Object.values(data).forEach(p=>{
   msg+=p.nombre+"\n";
   total+=p.precio;
  });

  msg+=`\nTotal: Gs. ${total.toLocaleString()}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
 },{onlyOnce:true});
};

// MENU
const res = await fetch("https://alo-rico.github.io/pizza/precios.json");
const productos = await res.json();
productosGlobal = productos;

const menu = document.getElementById("menu");

Object.entries(productos).forEach(([n,i])=>{
 const card=document.createElement("div");
 card.className="product";
 card.innerHTML=`<img src="${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;
 card.onclick=()=>{
  titulo.textContent=n;
  modal.style.display="flex";
 };
 menu.appendChild(card);
});
</script>

</body>
</html>
