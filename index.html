<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alo Rico - Mesas</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 font-family:'Poppins',sans-serif;
 background:#111827;
 color:white;
 min-height:100vh;
 overflow-x:hidden;
}

body::before{
 content:"";
 position:fixed;
 inset:0;
 background:
 linear-gradient(rgba(0,0,0,.84),rgba(0,0,0,.92)),
 url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1600&auto=format&fit=crop');
 background-size:cover;
 background-position:center;
 z-index:-2;
}

body::after{
 content:"";
 position:fixed;
 inset:0;
 backdrop-filter:blur(6px);
 z-index:-1;
}

header{
 text-align:center;
 padding:30px 20px 15px;
}

.logo{
 width:120px;
 border-radius:50%;
 border:4px solid #facc15;
 background:white;
 box-shadow:0 0 35px rgba(250,204,21,.35);
}

h1{
 margin-top:20px;
 font-size:40px;
 color:#facc15;
}

.sub{
 color:#d1d5db;
 margin-top:10px;
 font-size:18px;
}

.categorias{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:12px;
 width:95%;
 max-width:900px;
 margin:25px auto;
}

.cat-btn{
 padding:16px;
 border:none;
 border-radius:18px;
 color:white;
 font-weight:bold;
 cursor:pointer;
 font-size:14px;
 transition:.25s;
}

.cat-btn:hover{
 transform:translateY(-3px);
}

#btnPizza{
 background:#ef4444;
}

#btnHamburguesa{
 background:#22c55e;
}

#btnLomito{
 background:#f59e0b;
 color:black;
}

#btnBebida{
 background:#3b82f6;
}

.menu-container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:22px;
 padding:25px;
 padding-bottom:170px;
 max-width:1400px;
 margin:auto;
}

.product{
 background:rgba(255,255,255,.08);
 border:1px solid rgba(255,255,255,.08);
 border-radius:28px;
 overflow:hidden;
 cursor:pointer;
 transition:.25s;
 backdrop-filter:blur(10px);
 box-shadow:0 10px 30px rgba(0,0,0,.30);
}

.product:hover{
 transform:translateY(-6px);
}

.product img{
 width:100%;
 height:190px;
 object-fit:cover;
}

.product h3{
 font-size:20px;
 margin-top:16px;
 padding:0 12px;
 text-align:center;
}

.product p{
 margin:14px 0 24px;
 text-align:center;
 font-size:22px;
 font-weight:700;
 color:#22c55e;
}

#pedido-flotante{
 display:none;
 position:fixed;
 bottom:90px;
 left:50%;
 transform:translateX(-50%);
 width:95%;
 max-width:500px;
 background:#111827;
 border-radius:28px;
 padding:24px;
 border:1px solid rgba(255,255,255,.08);
 box-shadow:0 10px 40px rgba(0,0,0,.45);
 z-index:9999;
}

.item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:rgba(255,255,255,.05);
 padding:12px;
 border-radius:14px;
 margin-top:10px;
}

.btn-eliminar{
 width:30px;
 height:30px;
 border:none;
 border-radius:50%;
 background:#ef4444;
 color:white;
 cursor:pointer;
}

#total{
 margin-top:18px;
 font-size:28px;
 color:#22c55e;
 font-weight:bold;
 text-align:center;
}

#abrir-pedido{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#16a34a;
 color:white;
 border:none;
 padding:18px 24px;
 border-radius:20px;
 font-weight:bold;
 font-size:16px;
 z-index:99999;
 cursor:pointer;
 box-shadow:0 10px 25px rgba(0,0,0,.35);
}

#popup{
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.75);
 justify-content:center;
 align-items:center;
 z-index:99999;
}

.popup-content{
 background:#111827;
 padding:28px;
 border-radius:24px;
 width:320px;
}

.popup-content input{
 width:100%;
 padding:14px;
 border:none;
 border-radius:14px;
 background:#1f2937;
 color:white;
 margin-top:15px;
}

.popup-btn{
 margin-top:15px;
 width:100%;
 padding:14px;
 border:none;
 border-radius:14px;
 font-weight:bold;
 cursor:pointer;
 color:white;
}

@media(max-width:700px){

 .categorias{
  grid-template-columns:repeat(2,1fr);
 }

 .menu-container{
  grid-template-columns:repeat(2,1fr);
  gap:16px;
 }

 .product img{
  height:150px;
 }

 h1{
  font-size:30px;
 }

 #abrir-pedido{
  width:90%;
  right:5%;
 }
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>ALO RICO</h1>

<p class="sub" id="mesaTexto">
Mesa
</p>

</header>

<div class="categorias">

<button id="btnPizza" class="cat-btn">
🍕 PIZZAS
</button>

<button id="btnHamburguesa" class="cat-btn">
🍔 HAMBURGUESAS
</button>

<button id="btnLomito" class="cat-btn">
🥪 LOMITOS
</button>

<button id="btnBebida" class="cat-btn">
🥤 BEBIDAS
</button>

<a
 href="/game/"
 style="
 text-decoration:none;
 grid-column:span 4;
 ">

<button
 class="cat-btn"
 style="
 background:#8b5cf6;
 width:100%;
 font-size:18px;
 box-shadow:0 0 20px rgba(139,92,246,.45);
 ">

🎮 JUGAMOS?

</button>

</a>

</div>



<div id="menu" class="menu-container"></div>

<button id="abrir-pedido">
🛒 ENVIAR PEDIDO
</button>

<div id="pedido-flotante">

<h2 style="
text-align:center;
font-size:28px;
margin-bottom:15px;
color:#facc15;
">
Mi Pedido
</h2>

<div id="lista"></div>

<div id="total">
Gs. 0
</div>

</div>

<div id="popup">

<div class="popup-content">

<h2 id="popup-nombre">
Producto
</h2>

<input
 id="cantidad"
 type="number"
 value="1"
 min="1">

<button
 id="btn-entera"
 class="popup-btn"
 style="background:#16a34a;">
AGREGAR
</button>

<button
 id="btn-media"
 class="popup-btn"
 style="background:#f59e0b;">
🍕 MEDIA
</button>

<button
 onclick="cerrarPopup()"
 class="popup-btn"
 style="background:#ef4444;">
CANCELAR
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 onValue,
 remove,
 get
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const params =
new URLSearchParams(window.location.search);

const mesa =
params.get("mesa") || "1";

document.getElementById("mesaTexto")
.innerText =
`Mesa ${mesa}`;

const firebaseConfig = {

 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",

 authDomain: "alorico-59754.firebaseapp.com",

 databaseURL:
 "https://alorico-59754-default-rtdb.firebaseio.com",

 projectId: "alorico-59754"
};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const clienteId =
"mesa_" + mesa;

const pedidoRef =
ref(db,"pedidos/" + clienteId);

const menuDiv =
document.getElementById("menu");

const listaDiv =
document.getElementById("lista");

const totalDiv =
document.getElementById("total");

let productoSeleccionado = null;

let categoriaActual = "pizza";

let mediaPizza = null;

const popup =
document.getElementById("popup");

let timeoutPedido = null;

document
.getElementById("abrir-pedido")
.onclick = ()=>{

 const panel =
 document.getElementById("pedido-flotante");

 if(panel.style.display === "block"){

  enviarPedido();

  return;
 }

 panel.style.display = "block";

 clearTimeout(timeoutPedido);

 timeoutPedido = setTimeout(()=>{

  panel.style.display = "none";

 },7000);

};

function cargarProductos(){

 const productosRef =
 ref(db,"productos");

 onValue(productosRef,(snap)=>{

  const data = snap.val();

  menuDiv.innerHTML = "";

  if(!data) return;

  Object.values(data).forEach(prod=>{

   if(prod.categoria !== categoriaActual)
    return;

   const div =
   document.createElement("div");

   div.className =
   "product";

   div.innerHTML = `

   <img src="${prod.imagen}">

   <h3>${prod.nombre}</h3>

   <p>
    Gs. ${Number(prod.precio).toLocaleString()}
   </p>

   `;

   div.onclick = ()=>{

    productoSeleccionado = prod;

    document.getElementById("popup-nombre")
    .innerText = prod.nombre;

    document.getElementById("cantidad")
    .value = 1;

    popup.style.display = "flex";

    if(categoriaActual !== "pizza"){

     document.getElementById("btn-media")
     .style.display = "none";

     document.getElementById("btn-entera")
     .innerText = "AGREGAR";

    }else{

     document.getElementById("btn-media")
     .style.display = "block";

     document.getElementById("btn-entera")
     .innerText = "🍕 ENTERA";
    }

   };

   menuDiv.appendChild(div);

  });

 });

}

cargarProductos();

document.getElementById("btnPizza")
.onclick = ()=>{

 categoriaActual = "pizza";
 cargarProductos();
};

document.getElementById("btnHamburguesa")
.onclick = ()=>{

 categoriaActual = "hamburguesa";
 cargarProductos();
};

document.getElementById("btnLomito")
.onclick = ()=>{

 categoriaActual = "lomitos";
 cargarProductos();
};

document.getElementById("btnBebida")
.onclick = ()=>{

 categoriaActual = "bebidas";
 cargarProductos();
};

window.cerrarPopup = ()=>{

 popup.style.display = "none";
};

document.getElementById("btn-entera")
.onclick = ()=>{

 const cantidad =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 push(pedidoRef,{

  nombre:
  productoSeleccionado.nombre,

  precio:
  Number(productoSeleccionado.precio),

  cantidad,

  categoria:
  productoSeleccionado.categoria,

  tipo:
  categoriaActual === "pizza"
  ? "Pizza Entera"
  : "Normal"

 });

 popup.style.display = "none";
};

document.getElementById("btn-media")
.onclick = ()=>{

 const cantidad =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 if(!mediaPizza){

  mediaPizza = {

   nombre:
   productoSeleccionado.nombre,

   precio:
   Number(productoSeleccionado.precio),

   cantidad

  };

  popup.style.display = "none";

  alert(
   "Ahora selecciona la otra mitad 🍕"
  );

 }else{

  const nombreFinal =
  mediaPizza.nombre +
  " / " +
  productoSeleccionado.nombre;

  const precioFinal =
  Math.max(
   mediaPizza.precio,
   Number(productoSeleccionado.precio)
  );

  push(pedidoRef,{

   nombre:nombreFinal,

   precio:precioFinal,

   cantidad:mediaPizza.cantidad,

   categoria:"pizza",

   tipo:"Media y Media"

  });

  mediaPizza = null;

  popup.style.display = "none";
 }

};

onValue(pedidoRef,(snap)=>{

 const data = snap.val();

 listaDiv.innerHTML = "";

 let total = 0;

 if(data){

  Object.entries(data)
  .forEach(([id,p])=>{

   total +=
   p.precio * p.cantidad;

   const div =
   document.createElement("div");

   div.className = "item";

   div.innerHTML = `

    <div>

     <p>
      ${p.cantidad}x ${p.nombre}
     </p>

     <p style="
      color:#facc15;
      font-size:13px;
      margin-top:4px;
     ">
      ${p.tipo || ""}
     </p>

     <p style="
      color:#22c55e;
      font-weight:bold;
      margin-top:4px;
     ">
      Gs. ${(p.precio * p.cantidad)
      .toLocaleString()}
     </p>

    </div>

    <button
     class="btn-eliminar">
     🗑
    </button>

   `;

   div.querySelector("button")
   .onclick = ()=>{

    remove(
     ref(
      db,
      "pedidos/" + clienteId + "/" + id
     )
    );

   };

   listaDiv.appendChild(div);

  });

 }

 totalDiv.innerText =
 "Gs. " + total.toLocaleString();

});

let enviandoPedido = false;

async function enviarPedido(){

 if(enviandoPedido) return;

 enviandoPedido = true;

 try{

  const snap =
  await get(pedidoRef);

  const d = snap.val();

  if(!d){

   alert("Sin pedido");

   enviandoPedido = false;

   return;
  }

  let total = 0;

  Object.values(d).forEach(p=>{

   total += p.precio * p.cantidad;
  });

  const pedidoFinal = {

   tipoPedido:"mesa",

   mesa: mesa,

   estado: "preparando",

   timestamp: Date.now(),

   total: total,

   items: d
  };

  await push(
   ref(db,"pedidos_cocina"),
   pedidoFinal
  );

  await remove(pedidoRef);

  document.getElementById("pedido-flotante")
  .style.display = "none";

  alert("Pedido enviado correctamente ✔");

 }catch(e){

  console.error(e);

  alert("Error enviando pedido");

 }

 enviandoPedido = false;
}

</script>

</body>
</html>
