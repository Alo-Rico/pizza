<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Pizzas</title>

<style>
body { font-family: Arial, sans-serif; background-color: #fefaf0; text-align: center; margin: 0; padding: 0; }
header { margin-top: 20px; }
header img.logo { width: 120px; }
header h1 { font-size: 28px; color: #c24a00; }
header img.icono { width: 60px; }

.menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; padding-bottom: 180px; }

.product { width: 180px; background: white; margin: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; }
.product img { width: 100%; height: 140px; object-fit: cover; }

/* 🔥 BOTONES 3D */
button{
 transition: all 0.15s ease;
 box-shadow: 0 4px 0 rgba(0,0,0,0.2);
}
button:active{
 transform: translateY(3px);
 box-shadow: 0 1px 0 rgba(0,0,0,0.2);
}

.btn-grid {
 position: fixed;
 right: 15px;
 bottom: 15px;
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
}

.btn-flotante {
 color: #fff;
 border: none;
 padding: 12px;
 border-radius: 50px;
 font-weight: bold;
 cursor: pointer;
}

#btnHamburguesas{background:#28a745;}
#btnBebidas{background:#007bff;}
#btnLomitos{background:#ffc107;color:#000;}
#btnCarrito{background:#ff5722;}

#mensaje-total{
 display:none;
 background:#28a745;
 color:#fff;
 padding:8px;
 border-radius:10px;
 grid-column:span 2;
}

#pedido-flotante{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:#fff;
 padding:18px;
 border-radius:15px;
 box-shadow:0 12px 35px rgba(0,0,0,0.25);
 opacity:0;
 transition:all 0.35s ease;
 z-index:9999;
 width:90%;
 max-width:320px;
 text-align:center;
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
}

.item-pedido{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:5px 0;
}

.btn-eliminar{
 background:#e53935;
 color:white;
 border:none;
 border-radius:50%;
 width:25px;
 height:25px;
 cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center;">
 <div style="background:white;padding:20px;border-radius:10px;">
  <h3 id="modal-titulo"></h3>
  <input type="number" id="cantidad-input" value="1">
  <br><br>
  <button id="btn-entera">Entera</button>
  <button id="btn-mitad">Mitad</button>
  <button id="btn-cancelar">Cancelar</button>
 </div>
</div>

<!-- BOTONES -->
<div class="btn-grid">
<div id="mensaje-total">💰 Total: Gs. 0</div>
<button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
<button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
<button id="btnLomitos" class="btn-flotante">LOMITOS</button>
<button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<div id="pedido-flotante">
  <h3>Mi Pedido</h3>
  <ul id="lista-pedido"></ul>
  <p id="total-pedido"></p>

  <div class="acciones-pedido">
    <button id="btn-borrar">Borrar</button>
    <button id="enviar-whatsapp">Enviar pedido</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = { apiKey:"AIzaSy...",authDomain:"alorico-59754.firebaseapp.com",databaseURL:"https://alorico-59754-default-rtdb.firebaseio.com",projectId:"alorico-59754"};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId){ clienteId="cliente_"+Date.now(); localStorage.setItem("clienteId",clienteId); }

const pedidoRef = ref(db,"pedidos/"+clienteId);

// 🔥 AUTO CIERRE
btnCarrito.onclick=()=>{
 const p=document.getElementById("pedido-flotante");
 p.classList.toggle("activo");

 if(p.classList.contains("activo")){
  setTimeout(()=>p.classList.remove("activo"),7000);
 }
};

// 🔥 LISTA CON BASURERO
onValue(pedidoRef,(snap)=>{
 const data=snap.val();
 const lista=document.getElementById("lista-pedido");
 lista.innerHTML="";
 let total=0;

 if(data){
  Object.entries(data).forEach(([key,p])=>{
   total+=p.precio*p.cantidad;

   const li=document.createElement("li");
   li.className="item-pedido";

   li.innerHTML=`
    ${p.nombre} x${p.cantidad}
    <button class="btn-eliminar">🗑</button>
   `;

   li.querySelector(".btn-eliminar").onclick=()=>{
    remove(ref(db,"pedidos/"+clienteId+"/"+key));
   };

   lista.appendChild(li);
  });
 }

 document.getElementById("total-pedido").innerText="Gs. "+total;
});

// resto igual...
</script>

</body>
</html>
```
