<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú de Pizzas</title>

<style>
body { font-family: Arial; background:#fefaf0; margin:0; text-align:center; }

header img.logo { width:120px; }
header h1 { color:#c24a00; }

.icono { width:80px; margin:10px auto; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:160px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}

.product img {
  width:100%;
  height:140px;
  object-fit:cover;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
}

/* BOTONES */
.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-flotante {
  color: white;
  border: none;
  padding: 12px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  width: 140px;
}

#btnHamburguesas { background:#28a745; }
#btnLomitos { background:#ff5722; }
#btnBebidas { background:#00bcd4; }
#btnCarrito { background:#007bff; }
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="titulo"></h2>
    <button id="entera">Entera</button>
    <button id="mitad">Mitad</button>
    <button id="cancelar">Cancelar</button>
  </div>
</div>

<!-- BOTONES CORRECTOS -->
<div class="btn-grid">
  <button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
  <button id="btnLomitos" class="btn-flotante">LOMITOS</button>
  <button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
  <button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

let productosGlobal = {};
let mitadPendiente = null;

const modal = document.getElementById("modal");
const titulo = document.getElementById("titulo");

/* 🔥 TOTAL VERDE */
onValue(pedidoRef, snap=>{
  const data = snap.val();
  let total = 0;

  if(data){
    Object.values(data).forEach(p=>{
      total += p.precio;
    });
  }

  mostrarTotal(total);
});

function mostrarTotal(total){
  let box = document.getElementById("total-flotante");

  if(!box){
    box = document.createElement("div");
    box.id="total-flotante";
    box.style.position="fixed";
    box.style.bottom="90px";
    box.style.left="50%";
    box.style.transform="translateX(-50%)";
    box.style.background="#28a745";
    box.style.color="white";
    box.style.padding="12px 20px";
    box.style.borderRadius="30px";
    box.style.fontWeight="bold";
    box.style.zIndex="9999";
    document.body.appendChild(box);
  }

  if(total === 0){
    box.style.display="none";
    return;
  }

  box.style.display="block";
  box.innerText="💰 Total: Gs. " + total.toLocaleString();

  clearTimeout(box.timer);
  box.timer=setTimeout(()=>box.style.display="none",5000);
}

/* MODAL */
document.getElementById("cancelar").onclick=()=>modal.style.display="none";

document.getElementById("entera").onclick=()=>{
  const n = titulo.textContent;
  push(pedidoRef,{nombre:n,precio:productosGlobal[n].precio});
  modal.style.display="none";
};

document.getElementById("mitad").onclick=()=>{
  const n = titulo.textContent;
  const p = productosGlobal[n].precio;

  if(!mitadPendiente){
    mitadPendiente={n,p};
    modal.style.display="none";
    alert("Elegí la otra mitad");
  } else {
    const precioFinal = Math.max(mitadPendiente.p,p);
    push(pedidoRef,{
      nombre:`Mitad ${mitadPendiente.n} + ${n}`,
      precio:precioFinal
    });
    mitadPendiente=null;
    modal.style.display="none";
  }
};

/* 🔥 JSON */
const res = await fetch("https://alo-rico.github.io/pizza/precios.json");
const data = await res.json();
productosGlobal = data;

const menu = document.getElementById("menu");

Object.entries(data).forEach(([n,i])=>{
  const card=document.createElement("div");
  card.className="product";

  // ⚠️ IMPORTANTE: usar imagen directa (NO carpeta)
  card.innerHTML=`<img src="${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;

  card.onclick=()=>{
    titulo.textContent=n;
    modal.style.display="flex";
  };

  menu.appendChild(card);
});

/* BOTONES */
btnHamburguesas.onclick=()=>location.href="https://alo-rico.github.io/hamburguesa/";
btnLomitos.onclick=()=>location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick=()=>location.href="https://alo-rico.github.io/bebidas/";
</script>

</body>
</html>
