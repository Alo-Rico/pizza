<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú Alo Rico - Pizzas</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 font-family:'Poppins',sans-serif;
 background:#111827;
 color:white;
 text-align:center;
 min-height:100vh;
 overflow-x:hidden;
}

body::before{
 content:"";
 position:fixed;
 inset:0;
 background:
 linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.90)),
 url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1600&auto=format&fit=crop');
 background-size:cover;
 background-position:center;
 z-index:-2;
}

body::after{
 content:"";
 position:fixed;
 inset:0;
 backdrop-filter:blur(6px);
 z-index:-1;
}

header{
 padding:30px 20px 10px;
}

header img.logo{
 width:120px;
 border-radius:50%;
 border:4px solid #facc15;
 background:white;
 box-shadow:0 0 35px rgba(250,204,21,.35);
}

header h1{
 font-size:38px;
 margin-top:18px;
 color:#facc15;
 font-weight:700;
}

header img.icono{
 width:65px;
 margin-top:10px;
}

.menu-container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:22px;
 padding:25px;
 padding-bottom:320px;
 max-width:1400px;
 margin:auto;
}

.product{
 background:rgba(255,255,255,.08);
 border:1px solid rgba(255,255,255,.08);
 border-radius:28px;
 overflow:hidden;
 cursor:pointer;
 transition:.25s;
 backdrop-filter:blur(10px);
 box-shadow:0 10px 30px rgba(0,0,0,.30);
}

.product:hover{
 transform:translateY(-6px) scale(1.02);
}

.product img{
 width:100%;
 height:190px;
 object-fit:cover;
}

.product h3{
 font-size:20px;
 margin-top:16px;
 padding:0 12px;
 color:white;
}

.product p{
 margin:14px 0 24px;
 font-size:22px;
 font-weight:700;
 color:#22c55e;
}

.btn-grid{
 position:fixed;
 right:15px;
 bottom:15px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 z-index:10000;
}

.btn-flotante{
 width:165px;
 height:58px;
 border:none;
 border-radius:18px;
 font-weight:700;
 cursor:pointer;
 font-size:15px;
 color:white;
}

#btnHamburguesas{
 background:#22c55e;
}

#btnBebidas{
 background:#3b82f6;
}

#btnLomitos{
 background:#f59e0b;
 color:black;
}

#btnCarrito{
 background:#ef4444;
}

#mensaje-total{
 display:none;
 background:#22c55e;
 color:#fff;
 padding:14px 18px;
 border-radius:16px;
 font-weight:700;
 position:fixed;
 bottom:145px;
 left:50%;
 transform:translateX(-50%);
 z-index:9999;
 min-width:260px;
 cursor:pointer;
}

#pedido-flotante{
 position:fixed;
 bottom:210px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:#111827;
 border:1px solid rgba(255,255,255,.08);
 padding:22px;
 border-radius:24px;
 opacity:0;
 transition:all .35s ease;
 z-index:9999;
 width:92%;
 max-width:390px;
 text-align:center;
 pointer-events:none;
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
 pointer-events:auto;
}

#pedido-flotante ul{
 list-style:none;
 padding:0;
}

.item-pedido{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:10px 0;
 background:rgba(255,255,255,.05);
 padding:12px;
 border-radius:12px;
}

.btn-eliminar{
 background:#ef4444;
 color:white;
 border:none;
 border-radius:50%;
 width:28px;
 height:28px;
 cursor:pointer;
}

.acciones-pedido{
 display:flex;
 gap:10px;
 margin-top:16px;
}

.acciones-pedido button{
 flex:1;
 padding:13px;
 border:none;
 border-radius:14px;
 font-weight:700;
 cursor:pointer;
}

#btn-borrar{
 background:#dc2626;
 color:white;
}

#enviar-cocina{
 background:#16a34a;
 color:white;
}

#popup-cantidad{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,.75);
 justify-content:center;
 align-items:center;
 z-index:99999;
}

.popup-content{
 background:#111827;
 padding:28px;
 border-radius:24px;
 width:320px;
 color:white;
}

.popup-content input{
 width:90px;
 font-size:22px;
 text-align:center;
 padding:10px;
 border:none;
 border-radius:12px;
 background:#1f2937;
 color:white;
}

@media(max-width:700px){

 .menu-container{
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  padding:16px;
  padding-bottom:320px;
 }

 .product img{
  height:150px;
 }

 .btn-flotante{
  width:145px;
  height:54px;
  font-size:13px;
 }

 header h1{
  font-size:30px;
 }
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Menú de Pizzas</h1>

<img src="Repartidor.png" class="icono">

</header>

<div id="menu" class="menu-container"></div>

<div id="pedido-flotante">

<h3 id="titulo-pedido">
Enviar Pedido
</h3>

<ul id="lista-pedido"></ul>

<p id="total-pedido"></p>

<div class="acciones-pedido">

<button id="btn-borrar">
Borrar
</button>

<button id="enviar-cocina">
Enviar Pedido
</button>

</div>

</div>

<div id="popup-cantidad">

<div class="popup-content">

<h3 id="popup-nombre"></h3>

<input id="cantidad" type="number" value="1" min="1">

<br><br>

<button id="btn-entera"
style="
background:#22c55e;
color:white;
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:bold;
margin:5px;
">
🍕 Entera
</button>

<button id="btn-media"
style="
background:#f59e0b;
color:white;
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:bold;
margin:5px;
">
🍕 Media
</button>

<button onclick="cerrar()"
style="
background:#ef4444;
color:white;
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:bold;
margin:5px;
">
Cancelar
</button>

</div>

</div>

<div id="mensaje-total">
💰 Total: Gs. 0
</div>

<div class="btn-grid">

<button id="btnHamburguesas" class="btn-flotante">
HAMBURGUESAS
</button>

<button id="btnBebidas" class="btn-flotante">
BEBIDAS
</button>

<button id="btnLomitos" class="btn-flotante">
LOMITOS
</button>

<button id="btnCarrito" class="btn-flotante">
ENVIAR PEDIDO
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 get,
 onValue,
 remove
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const params =
new URLSearchParams(window.location.search);

const mesa =
params.get("mesa") || "general";

const firebaseConfig = {

 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",

 authDomain: "alorico-59754.firebaseapp.com",

 databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",

 projectId: "alorico-59754"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const clienteId =
"mesa_" + mesa;

const pedidoRef =
ref(db,"pedidos/" + clienteId);

document.getElementById("titulo-pedido")
.innerText =
`Enviar Pedido - Mesa ${mesa}`;

document.getElementById("btnHamburguesas").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/hamburguesa/?mesa=${mesa}`;
};

document.getElementById("btnBebidas").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/bebidas/?mesa=${mesa}`;
};

document.getElementById("btnLomitos").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/lomitos/?mesa=${mesa}`;
};

let timeoutPedido = null;

document.getElementById("btnCarrito").onclick = ()=>{

 const popup =
 document.getElementById("pedido-flotante");

 popup.classList.add("activo");

 clearTimeout(timeoutPedido);

 timeoutPedido = setTimeout(()=>{

  popup.classList.remove("activo");

 },7000);
};

const menuRef =
ref(db,"productos");

onValue(menuRef,(snap)=>{

 const data = snap.val();

 const menu =
 document.getElementById("menu");

 menu.innerHTML = "";

 if(data){

  Object.values(data).forEach((i)=>{

   if(i.categoria !== "pizza") return;

   const div =
   document.createElement("div");

   div.className = "product";

   div.innerHTML = `
    <img src="${i.imagen}">
    <h3>${i.nombre}</h3>
    <p>Gs. ${Number(i.precio).toLocaleString()}</p>
   `;

   div.onclick = ()=>{

    abrir(i.nombre,Number(i.precio));
   };

   menu.appendChild(div);
  });
 }
});

let seleccionado = {};
let mediaPizza = null;

window.abrir = (n,p)=>{

 seleccionado = {
  nombre:n,
  precio:p
 };

 document.getElementById("popup-nombre")
 .innerText = n;

 document.getElementById("cantidad")
 .value = 1;

 document.getElementById("popup-cantidad")
 .style.display = "flex";
};

window.cerrar = ()=>{

 document.getElementById("popup-cantidad")
 .style.display = "none";
};

document.getElementById("btn-entera")
.onclick = ()=>{

 const cant =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 push(pedidoRef,{
  nombre:seleccionado.nombre,
  precio:seleccionado.precio,
  cantidad:cant,
  tipo:"Pizza Entera"
 });

 cerrar();
};

document.getElementById("btn-media")
.onclick = ()=>{

 const cant =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 if(!mediaPizza){

  mediaPizza = {
   nombre:seleccionado.nombre,
   precio:seleccionado.precio,
   cantidad:cant
  };

  cerrar();

  alert("Ahora elige la otra mitad 🍕");

 }else{

  const nombreFinal =
  mediaPizza.nombre + " / " + seleccionado.nombre;

  const precioFinal =
  Math.max(
   mediaPizza.precio,
   seleccionado.precio
  );

  push(pedidoRef,{
   nombre:nombreFinal,
   precio:precioFinal,
   cantidad:mediaPizza.cantidad,
   tipo:"Media y Media"
  });

  mediaPizza = null;

  cerrar();
 }
};

onValue(pedidoRef,(snap)=>{

 const data = snap.val();

 const lista =
 document.getElementById("lista-pedido");

 lista.innerHTML = "";

 let total = 0;

 if(data){

  Object.entries(data).forEach(([k,p])=>{

   total += p.precio * p.cantidad;

   const li =
   document.createElement("li");

   li.className = "item-pedido";

   li.innerHTML = `

   <div style="
   display:flex;
   flex-direction:column;
   align-items:flex-start;
   text-align:left;
   ">

   <span style="
   font-weight:600;
   font-size:15px;
   ">
   ${p.cantidad} x ${p.nombre}
   </span>

   <span style="
   font-size:13px;
   color:#facc15;
   margin-top:4px;
   ">
   ${p.tipo || "Pizza"}
   </span>

   <span style="
   font-size:14px;
   color:#22c55e;
   margin-top:3px;
   font-weight:bold;
   ">
   Gs. ${(p.precio * p.cantidad).toLocaleString()}
   </span>

   </div>

   <button class="btn-eliminar">
   🗑
   </button>
   `;

   li.querySelector("button").onclick = ()=>{

    remove(ref(db,"pedidos/" + clienteId + "/" + k));
   };

   lista.appendChild(li);
  });
 }

 document.getElementById("total-pedido")
 .innerText =
 "TOTAL: Gs. " + total.toLocaleString();

 const mensaje =
 document.getElementById("mensaje-total");

 if(total > 0){

  mensaje.style.display = "block";

  mensaje.innerText =
  `💰 Mesa ${mesa} - Total: Gs. ${total.toLocaleString()}`;

  mensaje.onclick = enviarPedido;

 }else{

  mensaje.style.display = "none";
 }
});

document.getElementById("btn-borrar").onclick = ()=>{

 remove(pedidoRef);
};

let enviandoPedido = false;

async function enviarPedido(){

 if(enviandoPedido) return;

 enviandoPedido = true;

 try{

  const snap =
  await get(pedidoRef);

  const d = snap.val();

  if(!d){

   alert("Sin pedido");

   enviandoPedido = false;

   return;
  }

  let total = 0;

  Object.values(d).forEach(p=>{

   total += p.precio * p.cantidad;
  });

  const pedidoFinal = {

   mesa: mesa,

   estado: "pendiente",

   timestamp: Date.now(),

   total: total,

   items: d
  };

  await push(
   ref(db,"pedidos_cocina"),
   pedidoFinal
  );

  await remove(pedidoRef);

  document.getElementById("pedido-flotante")
  .classList.remove("activo");

  alert("Pedido enviado correctamente ✔");

 }catch(e){

  console.error(e);

  alert("Error enviando pedido");

 }

 enviandoPedido = false;
}

document.getElementById("enviar-cocina")
.onclick = enviarPedido;

</script>

</body>
</html>
