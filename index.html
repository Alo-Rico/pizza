<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Pizzas</title>

<style>
body { font-family: Arial; background:#fefaf0; margin:0; text-align:center; }
header img.logo { width:120px; }
header h1 { color:#c24a00; }
.icono { width:60px; }

.menu-container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; padding-bottom:180px; }

.product { width:180px; background:white; margin:15px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); cursor:pointer; }
.product img { width:100%; height:140px; object-fit:cover; }

.btn-grid { position:fixed; right:15px; bottom:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.btn-flotante { color:#fff; border:none; padding:12px; border-radius:50px; font-weight:bold; cursor:pointer; width:140px; }

#btnHamburguesas{background:#28a745;}
#btnBebidas{background:#007bff;}
#btnLomitos{background:#ffc107;color:#000;}
#btnCarrito{background:#ff5722;}

#mensaje-total{
  display:none;
  background:#28a745;
  color:#fff;
  padding:8px;
  border-radius:10px;
  grid-column:span 2;
  font-weight:bold;
}

#pedido-flotante{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#fff;
  padding:15px;
  border-radius:10px;
}

#pedido-flotante.activo{
  transform:translate(-50%,-50%) scale(1);
}
</style>

</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<!-- BOTONES -->

<div class="btn-grid">
<div id="mensaje-total">💰 Total: Gs. 0</div>

<button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button> <button id="btnBebidas" class="btn-flotante">BEBIDAS</button> <button id="btnLomitos" class="btn-flotante">LOMITOS</button> <button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>

</div>

<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar">Borrar</button>
</div>

<!-- 🔥 FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754",
  storageBucket: "alorico-59754.firebasestorage.app",
  messagingSenderId: "120993494626",
  appId: "1:120993494626:web:9f9cb0ad6fbfbd1abd033b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

// 🔥 RENDER GLOBAL (CLAVE)
onValue(pedidoRef, (snapshot)=>{
  const data = snapshot.val();
  const lista = document.getElementById("lista-pedido");
  const totalBox = document.getElementById("mensaje-total");

  lista.innerHTML="";
  let total=0;

  if(data){
    Object.values(data).forEach(p=>{
      const li=document.createElement("li");
      li.textContent=p.nombre+" - Gs. "+p.precio;
      lista.appendChild(li);
      total+=p.precio;
    });

    totalBox.style.display="block";
    totalBox.innerText="💰 Total: Gs. "+total.toLocaleString();

  }else{
    totalBox.style.display="none";
  }

  document.getElementById("total-pedido").innerText="Total: Gs. "+total;
});

// 🔥 AGREGAR PRODUCTO
function agregar(nombre,precio){
  push(pedidoRef,{nombre,precio});
}

// BOTONES
btnHamburguesas.onclick=()=>location.href="https://alo-rico.github.io/hamburguesa/";
btnLomitos.onclick=()=>location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick=()=>location.href="https://alo-rico.github.io/bebidas/";

btnCarrito.onclick=()=>{
  document.getElementById("pedido-flotante").classList.toggle("activo");
};

document.getElementById("btn-borrar").onclick=()=>remove(pedidoRef);

// MENU
const res = await fetch("precios.json");
const data = await res.json();

const menu=document.getElementById("menu");

Object.entries(data).forEach(([n,i])=>{
  const card=document.createElement("div");
  card.className="product";
  card.innerHTML=`<img src="${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;
  card.onclick=()=>agregar(n,i.precio);
  menu.appendChild(card);
});
</script>

</body>
</html>
