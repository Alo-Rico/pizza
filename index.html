<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Menú Alo Rico - Pizzas</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 font-family:'Poppins',sans-serif;
 background:#111827;
 color:white;
 text-align:center;
 min-height:100vh;
 overflow-x:hidden;
}

/* FONDO */

body::before{
 content:"";
 position:fixed;
 inset:0;
 background:
 linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.90)),
 url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1600&auto=format&fit=crop');
 background-size:cover;
 background-position:center;
 z-index:-2;
}

body::after{
 content:"";
 position:fixed;
 inset:0;
 backdrop-filter:blur(6px);
 z-index:-1;
}

/* HEADER */

header{
 padding:30px 20px 10px;
}

header img.logo{
 width:120px;
 border-radius:50%;
 border:4px solid #facc15;
 background:white;
 box-shadow:0 0 35px rgba(250,204,21,.35);
}

header h1{
 font-size:38px;
 margin-top:18px;
 color:#facc15;
 font-weight:700;
}

header img.icono{
 width:65px;
 margin-top:10px;
 filter:drop-shadow(0 0 10px rgba(255,255,255,.25));
}

/* MENU */

.menu-container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:22px;
 padding:25px;
 padding-bottom:220px;
 max-width:1400px;
 margin:auto;
}

/* PRODUCTOS */

.product{
 background:rgba(255,255,255,.08);
 border:1px solid rgba(255,255,255,.08);
 border-radius:28px;
 overflow:hidden;
 cursor:pointer;
 transition:.25s;
 backdrop-filter:blur(10px);
 box-shadow:0 10px 30px rgba(0,0,0,.30);
 position:relative;
}

.product:hover{
 transform:translateY(-6px) scale(1.02);
 box-shadow:0 20px 45px rgba(0,0,0,.45);
}

.product img{
 width:100%;
 height:190px;
 object-fit:cover;
}

.product h3{
 font-size:20px;
 margin-top:16px;
 padding:0 12px;
 color:white;
}

.product p{
 margin:14px 0 18px;
 font-size:22px;
 font-weight:700;
 color:#22c55e;
}

/* BOTONES */

button{
 transition:all .2s ease;
}

.btn-grid{
 position:fixed;
 right:15px;
 bottom:15px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 z-index:10000;
}

.btn-flotante{
 width:165px;
 height:58px;
 border:none;
 border-radius:18px;
 font-weight:700;
 cursor:pointer;
 font-size:15px;
 color:white;
 backdrop-filter:blur(10px);
 box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.btn-flotante:hover{
 transform:translateY(-2px);
}

#btnHamburguesas{
 background:#22c55e;
}

#btnBebidas{
 background:#3b82f6;
}

#btnLomitos{
 background:#f59e0b;
 color:black;
}

#btnCarrito{
 background:#ef4444;
}

/* TOTAL */

#mensaje-total{
 display:none;
 background:rgba(34,197,94,.95);
 color:#fff;
 padding:14px 18px;
 border-radius:16px;
 font-weight:700;
 box-shadow:0 10px 30px rgba(0,0,0,.35);
 text-align:center;
 position:fixed;
 bottom:145px;
 left:50%;
 transform:translateX(-50%);
 z-index:9999;
 min-width:260px;
 backdrop-filter:blur(10px);
}

/* PEDIDO */

#pedido-flotante{
 position:fixed;
 bottom:210px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:rgba(17,24,39,.95);
 border:1px solid rgba(255,255,255,.08);
 padding:22px;
 border-radius:24px;
 box-shadow:0 20px 45px rgba(0,0,0,.45);
 opacity:0;
 transition:all .35s ease;
 z-index:9999;
 width:92%;
 max-width:390px;
 text-align:center;
 pointer-events:none;
 backdrop-filter:blur(15px);
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
 pointer-events:auto;
}

#pedido-flotante h3{
 margin-bottom:16px;
 color:#facc15;
}

#pedido-flotante ul{
 list-style:none;
 padding:0;
 margin:0;
}

.item-pedido{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:10px 0;
 background:rgba(255,255,255,.05);
 padding:10px;
 border-radius:12px;
}

.btn-eliminar{
 background:#ef4444;
 color:white;
 border:none;
 border-radius:50%;
 width:28px;
 height:28px;
 cursor:pointer;
}

/* ACCIONES */

.acciones-pedido{
 display:flex;
 justify-content:space-between;
 gap:10px;
 margin-top:16px;
}

.acciones-pedido button{
 flex:1;
 padding:13px;
 border:none;
 border-radius:14px;
 font-weight:700;
 cursor:pointer;
 font-size:14px;
}

#btn-borrar{
 background:#dc2626;
 color:white;
}

#enviar-whatsapp{
 background:#16a34a;
 color:white;
}

/* MODAL */

#modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,.75);
 justify-content:center;
 align-items:center;
 z-index:99999;
 backdrop-filter:blur(6px);
}

.modal-content{
 background:#111827;
 border:1px solid rgba(255,255,255,.08);
 padding:28px;
 border-radius:28px;
 width:320px;
 text-align:center;
 box-shadow:0 20px 50px rgba(0,0,0,.5);
 color:white;
}

.modal-content h3{
 margin-bottom:16px;
 color:#facc15;
}

.modal-content input{
 width:100px;
 font-size:24px;
 text-align:center;
 padding:10px;
 margin-top:10px;
 border:none;
 border-radius:14px;
 background:#1f2937;
 color:white;
}

.modal-content button{
 padding:12px 18px;
 margin:12px 5px 0;
 border:none;
 border-radius:12px;
 font-weight:700;
 cursor:pointer;
}

/* RESPONSIVE */

@media(max-width:700px){

 .menu-container{
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  padding:16px;
 }

 .product{
  border-radius:22px;
 }

 .product img{
  height:150px;
 }

 .btn-flotante{
  width:145px;
  height:54px;
  font-size:13px;
 }

 header h1{
  font-size:30px;
 }
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Menú de Pizzas</h1>

<img src="Repartidor.png" class="icono">

</header>

<div id="menu" class="menu-container"></div>

<!-- MODAL -->

<div id="modal">

 <div class="modal-content">

  <h3 id="modal-titulo"></h3>

  <input type="number" id="cantidad-input" value="1" min="1">

  <br><br>

  <button id="btn-entera" style="background:#22c55e;color:white;">
   Entera
  </button>

  <button id="btn-mitad" style="background:#f59e0b;color:white;">
   Mitad
  </button>

  <button id="btn-cancelar" style="background:#ef4444;color:white;">
   Cancelar
  </button>

 </div>

</div>

<!-- TOTAL -->

<div id="mensaje-total">
💰 Total: Gs. 0
</div>

<!-- BOTONES -->

<div class="btn-grid">

<button id="btnHamburguesas" class="btn-flotante">
HAMBURGUESAS
</button>

<button id="btnBebidas" class="btn-flotante">
BEBIDAS
</button>

<button id="btnLomitos" class="btn-flotante">
LOMITOS
</button>

<button id="btnCarrito" class="btn-flotante">
MI PEDIDO
</button>

</div>

<!-- PEDIDO -->

<div id="pedido-flotante">

  <h3 id="titulo-pedido">
   Mi Pedido
  </h3>

  <ul id="lista-pedido"></ul>

  <p id="total-pedido"></p>

  <div class="acciones-pedido">

    <button id="btn-borrar">
      Borrar
    </button>

    <button id="enviar-whatsapp">
      Enviar pedido
    </button>

  </div>

</div>

</body>
</html>
