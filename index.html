<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Pizzas</title>

<style>
body { font-family: Arial, sans-serif; background-color: #fefaf0; text-align: center; margin: 0; padding: 0; }
header { margin-top: 20px; }
header img.logo { width: 120px; }
header h1 { font-size: 28px; color: #c24a00; }
header img.icono { width: 60px; }

.menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; padding-bottom: 180px; }

.product { width: 180px; background: white; margin: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; }
.product img { width: 100%; height: 140px; object-fit: cover; }

.btn-grid {
 position: fixed;
 right: 15px;
 bottom: 15px;
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
}

.btn-flotante {
 color: #fff;
 border: none;
 padding: 12px;
 border-radius: 50px;
 font-weight: bold;
 cursor: pointer;
}

#btnHamburguesas{background:#28a745;}
#btnBebidas{background:#007bff;}
#btnLomitos{background:#ffc107;color:#000;}
#btnCarrito{background:#ff5722;}

#mensaje-total{
 display:none;
 background:#28a745;
 color:#fff;
 padding:8px;
 border-radius:10px;
 grid-column:span 2;
}

#pedido-flotante{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:#fff;
 padding:18px;
 border-radius:15px;
 box-shadow:0 12px 35px rgba(0,0,0,0.25);
 opacity:0;
 transition:all 0.35s ease;
 z-index:9999;
 width:90%;
 max-width:320px;
 text-align:center;
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
}

#pedido-flotante h3{
 margin-top:0;
}

.acciones-pedido{
 display:flex;
 justify-content:space-between;
 gap:10px;
 margin-top:10px;
}

.acciones-pedido button{
 flex:1;
 padding:8px;
 border:none;
 border-radius:8px;
 font-weight:bold;
 cursor:pointer;
}

#btn-borrar{
 background:#e53935;
 color:white;
}

#enviar-whatsapp{
 background:#2e7d32;
 color:white;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center;">
 <div style="background:white;padding:20px;border-radius:10px;">
  <h3 id="modal-titulo"></h3>
  <input type="number" id="cantidad-input" value="1">
  <br><br>
  <button id="btn-entera">Entera</button>
  <button id="btn-mitad">Mitad</button>
  <button id="btn-cancelar">Cancelar</button>
 </div>
</div>

<!-- BOTONES -->
<div class="btn-grid">
<div id="mensaje-total">💰 Total: Gs. 0</div>
<button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
<button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
<button id="btnLomitos" class="btn-flotante">LOMITOS</button>
<button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<div id="pedido-flotante">
  <h3>Mi Pedido</h3>

  <ul id="lista-pedido"></ul>

  <p id="total-pedido"></p>

  <div class="acciones-pedido">
    <button id="btn-borrar">Borrar</button>
    <button id="enviar-whatsapp">Enviar pedido</button>
  </div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
 authDomain: "alorico-59754.firebaseapp.com",
 databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
 projectId: "alorico-59754"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
 clienteId = "cliente_" + Date.now();
 localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

// BOTONES
btnHamburguesas.onclick=()=>location.href="https://alo-rico.github.io/hamburguesa/";
btnLomitos.onclick=()=>location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick=()=>location.href="https://alo-rico.github.io/bebidas/";
btnCarrito.onclick=()=>document.getElementById("pedido-flotante").classList.toggle("activo");

// LISTEN
onValue(pedidoRef,(snap)=>{
 const data=snap.val();
 let total=0;
 const lista=document.getElementById("lista-pedido");
 lista.innerHTML="";
 if(data){
  Object.values(data).forEach(p=>{
   total+=p.precio*p.cantidad;
   lista.innerHTML+=`<li>${p.nombre} x${p.cantidad}</li>`;
  });
 }
 document.getElementById("total-pedido").innerText="Gs. "+total;
 document.getElementById("mensaje-total").style.display=total?"block":"none";
 document.getElementById("mensaje-total").innerText="💰 Total: Gs. "+total;
});

// MODAL
let productoSeleccionado={};
let mitadPendiente = null;

window.abrirPopup=(n,p)=>{
 productoSeleccionado={nombre:n,precio:p};
 document.getElementById("modal").style.display="flex";
 document.getElementById("modal-titulo").innerText=n;
};

// ENTERA (FIX)
document.getElementById("btn-entera").onclick = () => {
 const cant = parseInt(document.getElementById("cantidad-input").value)||1;

 push(pedidoRef,{
  nombre: productoSeleccionado.nombre,
  precio: productoSeleccionado.precio,
  cantidad: cant
 });

 document.getElementById("modal").style.display="none";
};

// MITAD (FIX)
document.getElementById("btn-mitad").onclick = () => {

 const nombre = productoSeleccionado.nombre;
 const precio = productoSeleccionado.precio;

 if(!mitadPendiente){
  mitadPendiente = {nombre, precio};
  document.getElementById("modal").style.display="none";
  alert("Elegí la otra mitad");
 }else{

  const nombre1 = mitadPendiente.nombre;
  const nombre2 = nombre;

  push(pedidoRef,{
   nombre:`½ ${nombre1} + ½ ${nombre2}`,
   precio: Math.max(mitadPendiente.precio, precio),
   cantidad:1
  });

  mitadPendiente = null;
  document.getElementById("modal").style.display="none";
 }
};

// CANCELAR
document.getElementById("btn-cancelar").onclick=()=>{
 document.getElementById("modal").style.display="none";
};

// BORRAR
document.getElementById("btn-borrar").onclick=()=>remove(pedidoRef);

// WHATSAPP
document.getElementById("enviar-whatsapp").onclick=()=>{
 onValue(pedidoRef,(snap)=>{
  const data=snap.val();
  if(!data)return alert("Sin pedido");

  let txt="";
  let total=0;

  Object.values(data).forEach(p=>{
   txt+=`- ${p.nombre} x${p.cantidad}\n`;
   total+=p.precio*p.cantidad;
  });

  const msg=`Hola:%0A${txt}%0ATotal: Gs. ${total}`;
  window.open(`https://wa.me/+595971891251?text=${msg}`);
 },{onlyOnce:true});
};

// MENU
const res=await fetch("precios.json");
const productos=await res.json();

Object.entries(productos).forEach(([n,i])=>{
 const div=document.createElement("div");
 div.className="product";
 div.innerHTML=`<img src="${i.imagen}?v=${Date.now()}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;
 div.onclick=()=>abrirPopup(n,i.precio);
 document.getElementById("menu").appendChild(div);
});
</script>

</body>
</html>
```
