<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alo Rico - Mesas</title>

<link rel="stylesheet" href="estyles.css">

</head>

<body style="--bg-image:url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1600&auto=format&fit=crop');">

<header>

<img src="logo.png" class="logo">

<h1>ALO RICO</h1>

<p class="sub" id="mesaTexto">
Mesa
</p>

</header>

<div class="categorias">

<button id="btnPizza" class="cat-btn">
🍕 PIZZAS
</button>

<button id="btnHamburguesa" class="cat-btn">
🍔 HAMBURGUESAS
</button>

<button id="btnLomito" class="cat-btn">
🥪 LOMITOS
</button>

<button id="btnBebida" class="cat-btn">
🥤 BEBIDAS
</button>

</div>

<div id="menu" class="menu-container"></div>

<button id="abrir-pedido">
🛒 ENVIAR PEDIDO
</button>

<div id="pedido-flotante">

<h2 style="
text-align:center;
font-size:28px;
margin-bottom:15px;
color:#facc15;
">
Mi Pedido
</h2>

<div id="lista"></div>

<div id="total">
Gs. 0
</div>

</div>

<div id="popup">

<div class="popup-content">

<h2 id="popup-nombre">
Producto
</h2>

<input
 id="cantidad"
 type="number"
 value="1"
 min="1">

<button
 id="btn-entera"
 class="popup-btn"
 style="background:#16a34a;">
AGREGAR
</button>

<button
 id="btn-media"
 class="popup-btn"
 style="background:#f59e0b;">
🍕 MEDIA
</button>

<button
 onclick="cerrarPopup()"
 class="popup-btn"
 style="background:#ef4444;">
CANCELAR
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 onValue,
 remove,
 get
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const params =
new URLSearchParams(window.location.search);

const mesa =
params.get("mesa") || "1";

document.getElementById("mesaTexto")
.innerText =
`Mesa ${mesa}`;

const firebaseConfig = {

 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",

 authDomain: "alorico-59754.firebaseapp.com",

 databaseURL:
 "https://alorico-59754-default-rtdb.firebaseio.com",

 projectId: "alorico-59754"
};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const clienteId =
"mesa_" + mesa;

const pedidoRef =
ref(db,"pedidos/" + clienteId);

const menuDiv =
document.getElementById("menu");

const listaDiv =
document.getElementById("lista");

const totalDiv =
document.getElementById("total");

let productoSeleccionado = null;

let categoriaActual = "pizza";

let mediaPizza = null;

const popup =
document.getElementById("popup");

let timeoutPedido = null;

document
.getElementById("abrir-pedido")
.onclick = ()=>{

 const panel =
 document.getElementById("pedido-flotante");

 if(panel.style.display === "block"){

  enviarPedido();

  return;
 }

 panel.style.display = "block";

 clearTimeout(timeoutPedido);

 timeoutPedido = setTimeout(()=>{

  panel.style.display = "none";

 },7000);

};

function cargarProductos(){

 const productosRef =
 ref(db,"productos");

 onValue(productosRef,(snap)=>{

  const data = snap.val();

  menuDiv.innerHTML = "";

  if(!data) return;

  Object.values(data).forEach(prod=>{

   if(prod.categoria !== categoriaActual)
    return;

   const div =
   document.createElement("div");

   div.className =
   "product";

   div.innerHTML = `

   <img src="${prod.imagen}">

   <h3>${prod.nombre}</h3>

   <p>
    Gs. ${Number(prod.precio).toLocaleString()}
   </p>

   `;

   div.onclick = ()=>{

    productoSeleccionado = prod;

    document.getElementById("popup-nombre")
    .innerText = prod.nombre;

    document.getElementById("cantidad")
    .value = 1;

    popup.style.display = "flex";

    if(categoriaActual !== "pizza"){

     document.getElementById("btn-media")
     .style.display = "none";

     document.getElementById("btn-entera")
     .innerText = "AGREGAR";

    }else{

     document.getElementById("btn-media")
     .style.display = "block";

     document.getElementById("btn-entera")
     .innerText = "🍕 ENTERA";
    }

   };

   menuDiv.appendChild(div);

  });

 });

}

cargarProductos();

document.getElementById("btnPizza")
.onclick = ()=>{

 categoriaActual = "pizza";
 cargarProductos();
};

document.getElementById("btnHamburguesa")
.onclick = ()=>{

 categoriaActual = "hamburguesa";
 cargarProductos();
};

document.getElementById("btnLomito")
.onclick = ()=>{

 categoriaActual = "lomitos";
 cargarProductos();
};

document.getElementById("btnBebida")
.onclick = ()=>{

 categoriaActual = "bebidas";
 cargarProductos();
};

window.cerrarPopup = ()=>{

 popup.style.display = "none";
};

document.getElementById("btn-entera")
.onclick = ()=>{

 const cantidad =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 push(pedidoRef,{

  nombre:
  productoSeleccionado.nombre,

  precio:
  Number(productoSeleccionado.precio),

  cantidad,

  categoria:
  productoSeleccionado.categoria,

  tipo:
  categoriaActual === "pizza"
  ? "Pizza Entera"
  : "Normal"

 });

 popup.style.display = "none";
};

document.getElementById("btn-media")
.onclick = ()=>{

 const cantidad =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 if(!mediaPizza){

  mediaPizza = {

   nombre:
   productoSeleccionado.nombre,

   precio:
   Number(productoSeleccionado.precio),

   cantidad

  };

  popup.style.display = "none";

  alert(
   "Ahora selecciona la otra mitad 🍕"
  );

 }else{

  const nombreFinal =
  mediaPizza.nombre +
  " / " +
  productoSeleccionado.nombre;

  const precioFinal =
  Math.max(
   mediaPizza.precio,
   Number(productoSeleccionado.precio)
  );

  push(pedidoRef,{

   nombre:nombreFinal,

   precio:precioFinal,

   cantidad:mediaPizza.cantidad,

   categoria:"pizza",

   tipo:"Media y Media"

  });

  mediaPizza = null;

  popup.style.display = "none";
 }

};

onValue(pedidoRef,(snap)=>{

 const data = snap.val();

 listaDiv.innerHTML = "";

 let total = 0;

 if(data){

  Object.entries(data)
  .forEach(([id,p])=>{

   total +=
   p.precio * p.cantidad;

   const div =
   document.createElement("div");

   div.className = "item";

   div.innerHTML = `

    <div>

     <p>
      ${p.cantidad}x ${p.nombre}
     </p>

     <p style="
      color:#facc15;
      font-size:13px;
      margin-top:4px;
     ">
      ${p.tipo || ""}
     </p>

     <p style="
      color:#22c55e;
      font-weight:bold;
      margin-top:4px;
     ">
      Gs. ${(p.precio * p.cantidad)
      .toLocaleString()}
     </p>

    </div>

    <button
     class="btn-eliminar">
     🗑
    </button>

   `;

   div.querySelector("button")
   .onclick = ()=>{

    remove(
     ref(
      db,
      "pedidos/" + clienteId + "/" + id
     )
    );

   };

   listaDiv.appendChild(div);

  });

 }

 totalDiv.innerText =
 "Gs. " + total.toLocaleString();

});

let enviandoPedido = false;

async function enviarPedido(){

 if(enviandoPedido) return;

 enviandoPedido = true;

 try{

  const snap =
  await get(pedidoRef);

  const d = snap.val();

  if(!d){

   alert("Sin pedido");

   enviandoPedido = false;

   return;
  }

  let total = 0;

  Object.values(d).forEach(p=>{

   total += p.precio * p.cantidad;
  });

  const pedidoFinal = {

   tipoPedido:"mesa",

   mesa: mesa,

   estado: "preparando",

   timestamp: Date.now(),

   total: total,

   items: d
  };

  await push(
   ref(db,"pedidos_cocina"),
   pedidoFinal
  );

  await remove(pedidoRef);

  document.getElementById("pedido-flotante")
  .style.display = "none";

  alert("Pedido enviado correctamente ✔");

 }catch(e){

  console.error(e);

  alert("Error enviando pedido");

 }

 enviandoPedido = false;
}

</script>

</body>
</html>
