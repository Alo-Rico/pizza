<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú de Pizzas</title>

<style>
body { font-family: Arial; background:#fefaf0; margin:0; text-align:center; }

header img.logo { width:120px; }
header h1 { color:#c24a00; }

.icono { width:80px; margin:10px auto; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:160px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}

.product img {
  width:100%;
  height:140px;
  object-fit:cover;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
}

/* BOTONES */
.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-flotante {
  color: white;
  border: none;
  padding: 12px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  width: 140px;
}

#btnHamburguesas { background:#28a745; }
#btnLomitos { background:#ff5722; }
#btnBebidas { background:#00bcd4; }
#btnCarrito { background:#007bff; }

/* PANEL PEDIDO */
#pedido-flotante {
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:2px solid #c24a00;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Pizzas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="titulo"></h2>
    <button id="entera">Entera</button>
    <button id="mitad">Mitad</button>
    <button id="cancelar">Cancelar</button>
  </div>
</div>

<!-- PANEL PEDIDO -->
<div id="pedido-flotante">
  <h3>Mi Pedido</h3>
  <ul id="lista-pedido"></ul>
  <p id="total-pedido"></p>
  <button id="btn-borrar">Borrar</button>
  <button id="btn-enviar">Enviar</button>
</div>

<!-- BOTONES -->
<div class="btn-grid">
  <button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
  <button id="btnLomitos" class="btn-flotante">LOMITOS</button>
  <button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
  <button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

let productoActual = null;
let mitadPendiente = null;

const modal = document.getElementById("modal");
const titulo = document.getElementById("titulo");

// =======================
// CLICK PRODUCTO
// =======================
function abrirProducto(nombre, precio){
  productoActual = {nombre, precio};
  titulo.innerText = nombre;
  modal.style.display = "flex";
}

// =======================
// MODAL
// =======================
document.getElementById("cancelar").onclick = () => modal.style.display = "none";

document.getElementById("entera").onclick = () => {
  push(pedidoRef,{
    nombre: productoActual.nombre,
    precio: productoActual.precio
  });
  modal.style.display = "none";
};

document.getElementById("mitad").onclick = () => {
  if(!mitadPendiente){
    mitadPendiente = productoActual;
    modal.style.display = "none";
    alert("Elegí la otra mitad");
  } else {
    const precio = Math.max(mitadPendiente.precio, productoActual.precio);

    push(pedidoRef,{
      nombre:`Mitad ${mitadPendiente.nombre} + ${productoActual.nombre}`,
      precio:precio
    });

    mitadPendiente = null;
    modal.style.display = "none";
  }
};

// =======================
// RENDER PEDIDO
// =======================
onValue(pedidoRef, snap=>{
  const data = snap.val();
  const lista = document.getElementById("lista-pedido");
  lista.innerHTML = "";

  let total = 0;

  if(data){
    Object.values(data).forEach(p=>{
      const li = document.createElement("li");
      li.textContent = p.nombre + " - Gs. " + p.precio.toLocaleString();
      lista.appendChild(li);
      total += p.precio;
    });
  }

  document.getElementById("total-pedido").innerText = "Total: Gs. " + total.toLocaleString();
});

// =======================
// BOTONES
// =======================
btnHamburguesas.onclick=()=>location.href="https://alo-rico.github.io/hamburguesa/";
btnLomitos.onclick=()=>location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick=()=>location.href="https://alo-rico.github.io/bebidas/";

// 👉 ESTE ES EL ARREGLO IMPORTANTE
btnCarrito.onclick=()=>{
  const panel = document.getElementById("pedido-flotante");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

// =======================
// BORRAR / ENVIAR
// =======================
document.getElementById("btn-borrar").onclick = ()=> remove(pedidoRef);

document.getElementById("btn-enviar").onclick = ()=>{
  let mensaje = "Hola, quiero pedir:\n";
  let total = 0;

  onValue(pedidoRef,(snap)=>{
    const data = snap.val();
    if(!data) return;

    Object.values(data).forEach(p=>{
      mensaje += `${p.nombre} - Gs. ${p.precio}\n`;
      total += p.precio;
    });

    mensaje += `\nTotal: Gs. ${total}`;
    window.open("https://wa.me/?text="+encodeURIComponent(mensaje));
  },{onlyOnce:true});
};

// =======================
// CARGAR MENU
// =======================
const res = await fetch("https://alo-rico.github.io/pizza/precios.json");
const data = await res.json();

const menu = document.getElementById("menu");

Object.entries(data).forEach(([n,i])=>{
  const card=document.createElement("div");
  card.className="product";

  card.innerHTML=`<img src="${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;

  card.onclick=()=>abrirProducto(n,i.precio);

  menu.appendChild(card);
});
</script>

</body>
</html>
